name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ✅ REQUIRED: checkout repo
      - uses: actions/checkout@v4

      # ✅ generate snake
      - uses: Platane/snk@v3
        with:
          github_user_name: fahadhaya72
          outputs: |
            dist/github-contribution-grid-snake.svg

      # ✅ deploy to output branch (modern way)
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
