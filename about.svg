<svg width="100%" viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Fahad Hayat — About Me</title>
  <desc>Animated about section showing profile, skills, and current status</desc>

  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060A10"/>
      <stop offset="100%" stop-color="#0D1520"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip2">
      <rect width="860" height="520" rx="6"/>
    </clipPath>
    <linearGradient id="bgrad" x1="0%" y1="0%" x2="100%" y2="0%">
