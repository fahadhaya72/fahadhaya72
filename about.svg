      <line x1="86" y1="0" x2="86" y2="520" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.15"/>
      <line x1="172" y1="0" x2="172" y2="520" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.15"/>
      <line x1="258" y1="0" x2="258" y2="520" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.15"/>
      <line x1="344" y1="0" x2="344" y2="520" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.15"/>
      <line x1="430" y1="0" x2="430" y2="520" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.15"/>
      <line x1="516" y1="0" x2="516" y2="520" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.15"/>
      <line x1="602" y1="0" x2="602" y2="520" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.15"/>
      <line x1="688" y1="0" x2="688" y2="520" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.15"/>
      <line x1="774" y1="0" x2="774" y2="520" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.15"/>
      <line x1="0" y1="52" x2="860" y2="52" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.15"/>
