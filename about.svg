      <stop offset="50%" stop-color="#F59E0B" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="gmask2" cx="50%" cy="50%" r="55%">
      <stop offset="20%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="gm2">
      <rect width="860" height="520" fill="url(#gmask2)"/>
    </mask>
  </defs>

  <g clip-path="url(#clip2)">
