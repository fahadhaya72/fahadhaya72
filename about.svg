    <text x="60" y="154" font-family="'Courier New',monospace" font-size="11" fill="#86EFAC" dx="18">"Full-Stack Dev", "Backend Eng"</text>
    <text x="60" y="168" font-family="'Courier New',monospace" font-size="11" fill="#475569">]</text>

    <!-- focus -->
    <text x="60" y="188" font-family="'Courier New',monospace" font-size="11" fill="#F59E0B">focus</text>
