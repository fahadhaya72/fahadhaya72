      <line x1="0" y1="156" x2="860" y2="156" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.15"/>
      <line x1="0" y1="208" x2="860" y2="208" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.15"/>
      <line x1="0" y1="260" x2="860" y2="260" stroke="#F59E0B" stroke-width="0.4" stroke-opacity="0.15"/>
