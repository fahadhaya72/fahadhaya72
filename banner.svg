  <desc>Animated profile banner for Fahad Hayat</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060A10"/>
      <stop offset="100%" stop-color="#0D1520"/>
